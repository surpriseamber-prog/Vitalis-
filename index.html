<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA essentials -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#00d4ff" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS specific -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vitalis" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- SEO / share -->
  <title>Vitalis — Family Health Platform</title>
  <meta name="description" content="Track vitals, bloodwork, hormones, workouts, nutrition and get AI health insights for your whole family." />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: #0a0f1e;
      color: #e2f0ff;
      -webkit-font-smoothing: antialiased;
      /* Safe area for iPhone notch / home indicator */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    /* Install prompt banner */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      border: 1px solid #1e3a5f;
      border-radius: 14px;
      padding: 14px 20px;
      z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 380px;
      width: calc(100% - 40px);
    }
    #install-banner.hidden { display: none !important; }
    #install-banner img { width: 40px; height: 40px; border-radius: 10px; }
    #install-banner .text { flex: 1; }
    #install-banner .text strong { display: block; font-family: sans-serif; font-size: 14px; color: #e2f0ff; margin-bottom: 2px; }
    #install-banner .text span { font-family: sans-serif; font-size: 12px; color: #6b8aaa; }
    #install-banner button {
      background: #00d4ff; color: #000; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    #install-close {
      background: none; border: none; color: #6b8aaa; font-size: 18px; cursor: pointer; padding: 4px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Install prompt banner (Android/Desktop Chrome) -->
  <div id="install-banner" class="hidden">
    <img src="/icons/icon-192.png" alt="Vitalis" />
    <div class="text">
      <strong>Add Vitalis to Home Screen</strong>
      <span>Access your health data instantly</span>
    </div>
    <button id="install-btn">Install</button>
    <button id="install-close">✕</button>
  </div>

  <!-- React + Babel via CDN for easy hosting -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Load app -->
  <script type="text/babel" data-type="module" src="/app.jsx"></script>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW failed:', err));
      });
    }

    // Handle install prompt (Android / Desktop)
    let deferredPrompt;
    const banner = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const closeBtn = document.getElementById('install-close');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      banner.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      banner.classList.add('hidden');
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('Install outcome:', outcome);
        deferredPrompt = null;
      }
    });

    closeBtn.addEventListener('click', () => banner.classList.add('hidden'));

    // Hide banner if already installed
    window.addEventListener('appinstalled', () => banner.classList.add('hidden'));
  </script>
</body>
</html>
